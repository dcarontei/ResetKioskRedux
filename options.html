<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>ResetKioskRedux Settings</title>
</head>

<body>
    <h1>ResetKioskRedux Settings</h1>

    <label>
        Timeout (seconds):
        <input type="number" id="timeoutSeconds" min="30" />
    </label>

    <br><br>

    <label>
        <input type="checkbox" id="disableContextMenu" />
        Disable right-click context menu
    </label>

    <br><br>

    <label>
        <input type="checkbox" id="closeOtherTabsOnReset" />
        Close all other tabs when homepage loads
    </label>

    <br><br>

    <button id="save">Save</button>

    <script src="options.js"></script>
</body>

</html>
